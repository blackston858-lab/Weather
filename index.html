<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Liquid Glass Weather</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
        /* ── reset & base ── */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0e1a;
            overflow: hidden;
            color: #fff;
            user-select: none;
            touch-action: none;
        }
        ::-webkit-scrollbar {
            height: 4px;
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
        }

        /* ── background layers ── */
        #bg-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            background: #0a0e1a;
            transition: background 2s ease;
        }
        #bg-sky {
            position: absolute;
            inset: 0;
            transition: background 2s ease;
            will-change: transform;
        }
        #bg-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            will-change: transform;
        }
        #bg-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 50% 80%, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
            transition: opacity 2s ease;
            will-change: opacity;
        }
        #lightning-flash {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.6);
            opacity: 0;
            transition: opacity 0.05s;
            z-index: 2;
            will-change: opacity;
        }

        /* ── parallax layers ── */
        .parallax-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            will-change: transform;
            transition: transform 0.1s ease-out;
        }

        /* ── clouds (CSS) ── */
        .cloud-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
            will-change: transform;
        }
        .cloud {
            position: absolute;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.08);
            filter: blur(40px);
            will-change: transform;
            backface-visibility: hidden;
        }
        .cloud.dense {
            background: rgba(255, 255, 255, 0.15);
            filter: blur(60px);
        }

        /* ── sun / moon glow ── */
        #sun-glow {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            filter: blur(80px);
            transition: all 2s ease;
            will-change: transform, opacity, width, height;
        }
        #moon-glow {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            filter: blur(60px);
            transition: all 2s ease;
            opacity: 0;
            will-change: transform, opacity, width, height;
        }

        /* ── main UI overlay ── */
        #app {
            position: relative;
            z-index: 10;
            height: 100vh;
            width: 100vw;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px 20px 40px;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 20px;
            will-change: transform;
        }
        #app::-webkit-scrollbar {
            width: 4px;
        }
        #app::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
        }

        /* ── glass panel base ── */
        .glass {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(35px) saturate(160%);
            -webkit-backdrop-filter: blur(35px) saturate(160%);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35), 0 2px 8px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
            transition: background 1.5s ease, border-color 1.5s ease, box-shadow 1.5s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: transform, background, border-color, box-shadow;
            transform: translateZ(0);
            backface-visibility: hidden;
        }
        .glass::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 30px;
            padding: 2px;
            background: conic-gradient(from 0deg at 50% 50%, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.01), rgba(255, 255, 255, 0.08));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: 0;
            animation: borderShimmer 12s linear infinite;
            will-change: background;
        }
        .glass::after {
            content: '';
            position: absolute;
            top: -30%;
            left: -30%;
            width: 60%;
            height: 60%;
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 255, 255, 0.10), transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: specularSweep 14s ease-in-out infinite alternate;
            mix-blend-mode: overlay;
            will-change: transform, opacity;
        }
        @keyframes specularSweep {
            0% {
                transform: translate(-10%, -10%) scale(1);
                opacity: 0.3;
            }
            50% {
                transform: translate(20%, 30%) scale(1.4);
                opacity: 0.9;
            }
            100% {
                transform: translate(60%, 10%) scale(0.8);
                opacity: 0.2;
            }
        }
        @keyframes borderShimmer {
            0% {
                background: conic-gradient(from 0deg at 50% 50%, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.01), rgba(255, 255, 255, 0.08));
            }
            100% {
                background: conic-gradient(from 360deg at 50% 50%, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.01), rgba(255, 255, 255, 0.08));
            }
        }

        .glass-content {
            position: relative;
            z-index: 1;
            padding: 20px 24px;
        }

        /* ── micro-interactions ── */
        .glass-card {
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease, background 0.3s ease;
            will-change: transform;
            cursor: default;
        }
        .glass-card:hover {
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.4), 0 0 60px rgba(255, 255, 255, 0.03);
        }
        .glass-card:active {
            transform: scale(0.97);
            transition-duration: 0.08s;
        }

        .clickable {
            cursor: pointer;
        }
        .clickable:active {
            transform: scale(0.96);
            transition-duration: 0.06s;
        }

        /* ── top bar ── */
        #top-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        #search-wrap {
            flex: 1;
            min-width: 200px;
            position: relative;
        }
        #search-input {
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            color: #fff;
            font-size: 15px;
            font-weight: 400;
            font-family: inherit;
            outline: none;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
            will-change: transform, background, border-color;
        }
        #search-input::placeholder {
            color: rgba(255, 255, 255, 0.35);
            font-weight: 300;
        }
        #search-input:focus {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.10);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.03), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            transform: scale(1.01);
        }
        #search-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            max-height: 320px;
            overflow-y: auto;
            border-radius: 20px;
            background: rgba(20, 24, 40, 0.80);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 100;
            padding: 6px;
            will-change: transform, opacity;
        }
        #search-dropdown.visible {
            display: block;
            animation: dropdownFade 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes dropdownFade {
            0% {
                opacity: 0;
                transform: translateY(-8px) scale(0.98);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .search-result {
            padding: 12px 16px;
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 2px;
            will-change: transform, background;
            opacity: 0;
            animation: resultFade 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .search-result:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }
        .search-result:active {
            transform: scale(0.97);
        }
        @keyframes resultFade {
            0% {
                opacity: 0;
                transform: translateY(-6px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .search-result .city {
            font-weight: 500;
            font-size: 15px;
            color: #fff;
        }
        .search-result .sub {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
        }
        .search-result .sub .country {
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #search-status {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            padding: 12px 16px;
            text-align: center;
        }

        #geo-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(255, 255, 255, 0.08);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
            will-change: transform, background, border-color;
        }
        #geo-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.15);
            transform: scale(1.04);
        }
        #geo-btn:active {
            transform: scale(0.95);
            transition-duration: 0.06s;
        }
        #geo-btn svg {
            width: 16px;
            height: 16px;
            fill: rgba(255, 255, 255, 0.6);
        }

        #unit-toggle {
            display: flex;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 4px;
            gap: 2px;
            flex-shrink: 0;
        }
        #unit-toggle button {
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: transform, background, color;
        }
        #unit-toggle button.active {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
            transform: scale(1.02);
        }
        #unit-toggle button:hover:not(.active) {
            color: rgba(255, 255, 255, 0.7);
            transform: scale(1.04);
        }
        #unit-toggle button:active {
            transform: scale(0.94);
            transition-duration: 0.06s;
        }

        /* ── hero ── */
        #hero {
            flex-shrink: 0;
        }
        #hero .glass-content {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px 24px;
        }
        #hero-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }
        #hero-temp-wrap {
            display: flex;
            align-items: baseline;
            gap: 6px;
            flex-wrap: wrap;
        }
        #hero-temp {
            font-size: clamp(80px, 16vw, 150px);
            font-weight: 300;
            line-height: 1;
            letter-spacing: -4px;
            color: #fff;
            text-shadow: 0 2px 40px rgba(0, 0, 0, 0.2);
            will-change: transform, opacity;
            transition: none;
            display: inline-block;
        }
        #hero-temp-unit {
            font-size: clamp(24px, 4vw, 40px);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.5);
            margin-left: 4px;
            will-change: opacity;
            transition: opacity 0.3s ease;
        }
        #hero-condition {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 4px;
        }
        #hero-condition-icon {
            width: 40px;
            height: 40px;
            flex-shrink: 0;
            will-change: transform;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #hero-condition-icon:hover {
            transform: rotate(10deg) scale(1.08);
        }
        #hero-condition-label {
            font-size: 18px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.7);
        }
        #hero-feels-like {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
        }
        #hero-location {
            font-size: 20px;
            font-weight: 500;
            color: #fff;
        }
        #hero-location .sub {
            font-weight: 400;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
        }
        #hero-datetime {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.35);
            font-weight: 400;
        }
        #hero-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
            text-align: right;
        }
        #hero-high-low {
            font-size: 18px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            gap: 12px;
            align-items: center;
        }
        #hero-high-low .high {
            color: rgba(255, 255, 255, 0.8);
        }
        #hero-high-low .low {
            color: rgba(255, 255, 255, 0.4);
        }
        #hero-precip {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.35);
        }

        /* ── details grid ── */
        #details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            flex-shrink: 0;
        }
        .detail-card {
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px 18px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            will-change: transform, background, border-color;
            cursor: default;
        }
        .detail-card:hover {
            transform: translateY(-3px) scale(1.02);
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.10);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        .detail-card:active {
            transform: scale(0.97);
            transition-duration: 0.06s;
        }
        .detail-card .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 600;
        }
        .detail-card .value {
            font-size: 24px;
            font-weight: 400;
            color: #fff;
            margin-top: 4px;
            letter-spacing: -0.5px;
            will-change: transform;
            transition: transform 0.3s ease;
        }
        .detail-card .sub {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 2px;
        }
        .detail-card .wind-arrow {
            display: inline-block;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-size: 20px;
            will-change: transform;
        }
        .detail-card .sun-arc {
            width: 100%;
            height: 20px;
            margin-top: 6px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .detail-card .sun-arc-track {
            width: 80%;
            height: 3px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.06);
            position: relative;
            overflow: hidden;
        }
        .detail-card .sun-arc-fill {
            height: 100%;
            border-radius: 6px;
            background: linear-gradient(90deg, rgba(255, 200, 50, 0.3), rgba(255, 200, 50, 0.8));
            transition: width 1.5s ease;
            will-change: width;
        }
        .detail-card .sun-arc-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.25);
            margin-top: 4px;
            display: flex;
            justify-content: space-between;
            width: 80%;
        }

        /* ── hourly ── */
        #hourly-wrap {
            flex-shrink: 0;
        }
        #hourly-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 4px 2px 12px;
            scroll-snap-type: x mandatory;
            will-change: scroll-position;
        }
        .hourly-chip {
            flex: 0 0 70px;
            scroll-snap-align: start;
            border-radius: 60px;
            padding: 12px 6px 10px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px) saturate(130%);
            -webkit-backdrop-filter: blur(16px) saturate(130%);
            border: 1px solid rgba(255, 255, 255, 0.04);
            text-align: center;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            min-width: 60px;
            will-change: transform, background, border-color;
            cursor: default;
        }
        .hourly-chip:hover {
            transform: translateY(-4px) scale(1.04);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.10);
        }
        .hourly-chip:active {
            transform: scale(0.95);
            transition-duration: 0.06s;
        }
        .hourly-chip .h-time {
            font-size: 11px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.4);
        }
        .hourly-chip .h-icon {
            width: 28px;
            height: 28px;
            margin: 4px auto;
            will-change: transform;
            transition: transform 0.3s ease;
        }
        .hourly-chip:hover .h-icon {
            transform: scale(1.12) rotate(4deg);
        }
        .hourly-chip .h-temp {
            font-size: 16px;
            font-weight: 400;
            color: #fff;
        }
        .hourly-chip .h-precip {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.25);
            margin-top: 2px;
        }

        /* ── daily ── */
        #daily-wrap {
            flex-shrink: 0;
        }
        #daily-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 2px 0;
        }
        .daily-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: transform, background, border-color;
            cursor: default;
        }
        .daily-row:hover {
            transform: translateX(4px) scale(1.01);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.08);
        }
        .daily-row:active {
            transform: scale(0.98);
            transition-duration: 0.06s;
        }
        .daily-row .d-day {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            width: 80px;
            flex-shrink: 0;
        }
        .daily-row .d-icon {
            width: 30px;
            height: 30px;
            flex-shrink: 0;
            will-change: transform;
            transition: transform 0.3s ease;
        }
        .daily-row:hover .d-icon {
            transform: scale(1.1) rotate(3deg);
        }
        .daily-row .d-condition {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            flex: 1;
            min-width: 60px;
        }
        .daily-row .d-temps {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .daily-row .d-temps .high {
            font-size: 16px;
            font-weight: 500;
            color: #fff;
        }
        .daily-row .d-temps .low {
            font-size: 14px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.3);
        }
        .daily-row .d-bar-wrap {
            width: 80px;
            height: 4px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.06);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        .daily-row .d-bar-fill {
            height: 100%;
            border-radius: 6px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.6));
            transition: width 0.8s ease, margin-left 0.8s ease;
            will-change: width, margin-left;
            position: absolute;
            top: 0;
            left: 0;
        }
        .daily-row .d-precip {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.25);
            width: 44px;
            text-align: right;
            flex-shrink: 0;
        }

        /* ── loading / error ── */
        #loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 14, 26, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: opacity 0.8s ease;
            pointer-events: none;
            opacity: 0;
            will-change: opacity;
        }
        #loading-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }
        #loading-overlay .spinner {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top-color: rgba(255, 255, 255, 0.5);
            animation: spin 1s linear infinite;
            will-change: transform;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        #loading-overlay .msg {
            margin-top: 20px;
            font-size: 16px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.4);
        }

        #error-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            z-index: 200;
            background: rgba(30, 20, 40, 0.90);
            backdrop-filter: blur(30px) saturate(160%);
            -webkit-backdrop-filter: blur(30px) saturate(160%);
            border: 1px solid rgba(255, 100, 100, 0.15);
            border-radius: 20px;
            padding: 16px 28px;
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
            pointer-events: none;
            max-width: 90vw;
            will-change: transform, opacity;
        }
        #error-toast.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }
        #error-toast .msg {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }
        #error-toast .retry-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: transform, background;
        }
        #error-toast .retry-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.04);
        }
        #error-toast .retry-btn:active {
            transform: scale(0.94);
            transition-duration: 0.06s;
        }

        /* ── responsive ── */
        @media (max-width: 700px) {
            #app {
                padding: 12px 14px 30px;
                gap: 14px;
            }
            .glass-content {
                padding: 16px 18px;

            #details-grid {

                gap: 8px;
            }
            .detail-card {
                padding: 12px 10px;
            }
            .detail-card .value {
                font-size: 18px;
            }
            #top-bar {
                gap: 8px;
            }
            #search-wrap {
                min-width: 140px;
                order: 1;
                flex-basis: 100%;
            }
            #geo-btn {
                padding: 10px 14px;
                font-size: 12px;
            }
            #unit-toggle button {
                padding: 4px 10px;
                font-size: 12px;
            }
            .daily-row .d-day {
                width: 60px;
                font-size: 12px;
            }
            .daily-row .d-bar-wrap {
                width: 50px;
            }
            .daily-row .d-precip {
                width: 36px;
                font-size: 10px;
            }
            .hourly-chip {
                flex: 0 0 58px;
                padding: 10px 4px 8px;
                min-width: 52px;
            }
            .hourly-chip .h-temp {
                font-size: 14px;
            }
            .glass {
                border-radius: 20px;
            }
            .glass::before {
                border-radius: 22px;
            }
        }
        @media (max-width: 450px) {
            #details-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            #hero-temp {
                font-size: 56px;
            }
        }

        /* ── skeleton shimmer ── */
        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.03) 25%, rgba(255, 255, 255, 0.08) 50%, rgba(255, 255, 255, 0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.8s ease-in-out infinite;
            border-radius: 12px;
        }
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }
        .skeleton-text {
            height: 14px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.6;
            }
        }

        /* ── utility ── */
        .hidden {
            display: none !important;
        }
        .flex-1 {
            flex: 1;
        }
        .gap-4 {
            gap: 4px;
        }
        .mt-2 {
            margin-top: 8px;
        }
        .text-center {
            text-align: center;
        }
        .text-muted {
            color: rgba(255, 255, 255, 0.3);

        /* ── geo permission message ── */
        #geo-permission-msg {
            font-size: 12px;

        }

</head>
<body>

            <div class="glass-content" style="padding-bottom:12px;">
